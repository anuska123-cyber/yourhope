<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Registry Desk | YourHope</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="global-header"></header>
    <main class="container">
        <div class="grid-2">
            <div class="card">
                <h2>Drop a Query</h2>
                <form id="contactSubmissionForm">
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" id="cName" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Active Email</label>
                        <input type="email" id="cEmail" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Detailed Message Context</label>
                        <textarea id="cMsg" class="form-control" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn">Dispatch Message</button>
                </form>
            </div>
            <div>
                <h2>Central Operational Headquarters</h2>
                <p><strong>Address:</strong> 104 Hope Street, Sector 4, Capital Territory Hub</p>
                <p><strong>Phone Liaison:</strong> +1 (555) 019-2831</p>
                <p><strong>Registry Email:</strong> administrative@yourhope.org</p>
                <br>
               <img src="images/contact-map.jpg" alt="a map" style="width:100%; height:200px; object-fit:cover; border-radius:4px; margin-bottom:1rem;">
                    Interactive Satellite Location Routing Vector Placeholder Map
                </div>
            </div>
        </div>
    </main>
    <footer id="global-footer"></footer>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script>
        renderGlobalHeaderFooter("");
        document.getElementById('contactSubmissionForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const contacts = getContacts();
            contacts.push({
                name: document.getElementById('cName').value,
                email: document.getElementById('cEmail').value,
                msg: document.getElementById('cMsg').value,
                date: new Date().toISOString().split('T')[0]
            });
            localStorage.setItem('yh_contacts', JSON.stringify(contacts));
            alert('Your message has been logged into the browser database. Admins will verify it in their query queue.');
            document.getElementById('contactSubmissionForm').reset();
        });
    </script>
</body>
</html>
