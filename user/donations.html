<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Giving Ledgers | YourHope</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header id="global-header"></header>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <h3>User Center</h3>
            <div class="sidebar-links">
                <a href="dashboard.html">Overview Performance</a>
                <a href="donations.html" class="active">My Giving Ledgers</a>
                <a href="volunteer.html">Volunteer Declarations</a>
                <a href="profile.html">Identity Parameters</a>
            </div>
        </aside>
        <main class="main-content">
            <h2>Personalized Contribution Invoices Ledger</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr><th>Tracking Hash ID</th><th>Target Sector Allocation</th><th>Amount Contributed</th><th>Date Verified</th><th>Receipt Node</th></tr>
                    </thead>
                    <tbody id="user-donations-tbody"></tbody>
                </table>
            </div>
        </main>
    </div>
    <footer id="global-footer"></footer>
    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        enforceAccess('user');
        renderGlobalHeaderFooter("../");
        
        const trackingList = getDonations();
        let rows = '';
        trackingList.forEach(d => {
            rows += `
                <tr>
                    <td><code>${d.id}</code></td>
                    <td>${d.campaign}</td>
                    <td><strong>$${d.amount}</strong></td>
                    <td>${d.date}</td>
                    <td><button class="btn btn-secondary" style="padding:0.3rem 0.6rem; font-size:0.75rem;" onclick="alert('Generating Prototype Receipt for ${d.id}\\nDonor: ${d.donor}\\nAmount: $${d.amount}\\nStatus: Cleared 80G Compliant')">Download Voucher</button></td>
                </tr>`;
        });
        document.getElementById('user-donations-tbody').innerHTML = rows;
    </script>
</body>
</html>
