<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Access Matrix | YourHope</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="global-header"></header>
    <main class="container" style="max-width:450px; margin-top:4rem; margin-bottom:4rem;">
        <div class="card">
            <h2 style="text-align:center;">Account Authorization</h2>
            <p style="text-align:center; font-size:0.85rem; color:var(--gray); margin-bottom:1.5rem;">
                Admin Key: admin / admin123 | User Key: user / user123
            </p>
            <form id="loginForm">
                <div class="form-group">
                    <label>Username / Account ID</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password Protection Cipher</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn" style="width:100%; padding:0.75rem;">Authenticate Session</button>
            </form>
        </div>
    </main>
    <footer id="global-footer"></footer>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script>
        renderGlobalHeaderFooter("");
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(!login(u, p)) {
                alert('Invalid operational parameters. Use provided prototype credentials.');
            }
        });
    </script>
</body>
</html>
