<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inbound Desks | YourHope</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header id="global-header"></header>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <h3>Admin Matrix</h3>
            <div class="sidebar-links">
                <a href="dashboard.html">Metrics Overview</a>
                <a href="donations.html">Ledger Database</a>
                <a href="volunteers.html">Field Personnel</a>
                <a href="events.html">Strategic Schedules</a>
                <a href="users.html">Account Audits</a>
                <a href="contact.html" class="active">Inbound Queries</a>
            </div>
        </aside>
        <main class="main-content">
            <h2>User Support Tickets & Strategic Inquiries Queue</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr><th>Sender Name</th><th>Email Node</th><th>Inbound Message Body Text</th><th>Action Context</th></tr>
                    </thead>
                    <tbody id="master-contacts-tbody"></tbody>
                </table>
            </div>
        </main>
    </div>
    <footer id="global-footer"></footer>
    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        enforceAccess('admin');
        renderGlobalHeaderFooter("../");
        
        const contacts = getContacts();
        let html = '';
        contacts.forEach(c => {
            html += `<tr><td><strong>${c.name}</strong></td><td>${c.email}</td><td>"${c.msg}"</td><td><button class="btn" style="padding:0.2rem 0.5rem; font-size:0.8rem;" onclick="alert('Simulating outbound tracking reply protocol message node.')">Mark Resolved</button></td></tr>`;
        });
        document.getElementById('master-contacts-tbody').innerHTML = html;
    </script>
</body>
</html>
