<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile Enrollment Registry | YourHope</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="global-header"></header>
    <main class="container" style="max-width:500px; margin-top:3rem; margin-bottom:4rem;">
        <div class="card">
            <h2 style="text-align:center;">Create Contributor Profile</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Preferred User Handler ID</label>
                    <input type="text" class="form-control" required placeholder="e.g., hopechanger99">
                </div>
                <div class="form-group">
                    <label>Full Structural Identity Name</label>
                    <input type="text" class="form-control" required placeholder="Johnathan Doe">
                </div>
                <div class="form-group">
                    <label>Active Contact Email Node</label>
                    <input type="email" class="form-control" required placeholder="me@domain.com">
                </div>
                <div class="form-group">
                    <label>Access Password Definition</label>
                    <input type="password" class="form-control" required placeholder="********">
                </div>
                <button type="submit" class="btn btn-secondary" style="width:100%;">Finalize Registry Enrollment</button>
            </form>
        </div>
    </main>
    <footer id="global-footer"></footer>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script>
        renderGlobalHeaderFooter("");
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const stats = getStats();
            stats.totalUsers += 1;
            updateStats(stats);
            alert('Profile successfully registered to prototype matrix array! You can now access using the standard credential identity "user".');
            window.location.href = "login.html";
        });
    </script>
</body>
</html>
